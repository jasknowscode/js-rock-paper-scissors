<body>
    <script>
        // Create function for getComputerChoice//
        function getComputerChoice() {
        const x =  Math.random() * 3;

            if (x < 1) {
                return ("Rock")
            }
            else if (x >= 2) {
                return ("Paper")
            }
            else {
                return ("Scissors")
            }
        } 
        console.log(getComputerChoice());
    </script>
